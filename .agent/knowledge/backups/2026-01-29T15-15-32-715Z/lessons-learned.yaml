- id: LEARN-002
  pattern: "Using JSX.Element without importing React in TypeScript"
  severity: HIGH
  message: |
    In React 18+ with TypeScript, JSX namespace may not be globally available.
    Use `import { ReactNode } from 'react'` and type as `ReactNode` instead of `JSX.Element`.
  date: "2026-01-29"
  trigger: "TypeScript errors, JSX namespace"
  fix_applied: true
  example_fix: |
    // Before
    const icons: Record<string, JSX.Element> = { ... }

    // After
    import { ReactNode } from 'react';
    const icons: Record<string, ReactNode> = { ... }
