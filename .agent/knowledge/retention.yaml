# Knowledge Retention Policy v1.0
# Auto-cleanup rules for maintaining knowledge base health

version: 1
lastUpdated: "2026-01-28T11:00:00Z"

# Global settings
settings:
  enabled: false # MUST be explicitly enabled
  dryRunDefault: true # Safety: always dry-run first
  backupBeforeCleanup: true # MANDATORY backup
  confirmationRequired: true # Human approval required

# Retention policies
# Evaluation order: bottom to top (protect runs last)
policies:
  # ===========================================
  # POLICY 1: Stale Low-Value Lessons
  # ===========================================
  - name: stale_unused_lessons
    description: Archive lessons with no hits after 90 days
    enabled: true
    priority: 1

    condition:
      all:
        - field: lastHit
          operator: isNull
        - field: hitCount
          operator: equals
          value: 0
        - field: addedAt
          operator: olderThan
          value: 90 # days

    action:
      type: archive
      destination: .agent/knowledge/backups/stale/
      notification: true

    exceptions:
      - field: cognitive.maturity
        operator: equals
        value: stable
      - field: tags
        operator: contains
        value: security

  # ===========================================
  # POLICY 2: Low Confidence, Low Activity
  # ===========================================
  - name: low_confidence_lessons
    description: Soft-delete lessons with low confidence and minimal hits
    enabled: true
    priority: 2

    condition:
      all:
        - field: cognitive.confidence
          operator: lessThan
          value: 0.3
        - field: hitCount
          operator: lessThan
          value: 5
        - field: addedAt
          operator: olderThan
          value: 60 # days

    action:
      type: soft_delete
      gracePeriod: 30 # days before permanent deletion
      destination: .agent/knowledge/_deleted/
      notification: true

    exceptions:
      - field: severity
        operator: equals
        value: ERROR

  # ===========================================
  # POLICY 3: Deprecated Lessons
  # ===========================================
  - name: deprecated_lessons
    description: Move deprecated lessons to archive
    enabled: true
    priority: 3

    condition:
      any:
        - field: cognitive.maturity
          operator: equals
          value: deprecated
        - field: tags
          operator: contains
          value: obsolete

    action:
      type: archive
      destination: .agent/knowledge/backups/deprecated/
      notification: false

  # ===========================================
  # POLICY 4: Duplicate Patterns
  # ===========================================
  - name: duplicate_patterns
    description: Flag lessons with identical patterns
    enabled: true
    priority: 4

    condition:
      custom: detectDuplicatePatterns # Special function

    action:
      type: flag
      destination: .agent/knowledge/_needs_review.yaml
      notification: true

    exceptions: []

  # ===========================================
  # POLICY 5: High-Value Protection
  # ===========================================
  - name: high_value_lessons
    description: PROTECT high-value lessons from all cleanup
    enabled: true
    priority: 99 # Highest priority (evaluated last)

    condition:
      any:
        - field: hitCount
          operator: greaterThan
          value: 100
        - field: cognitive.confidence
          operator: greaterThan
          value: 0.9
        - field: tags
          operator: contains
          value: critical
        - field: severity
          operator: equals
          value: ERROR

    action:
      type: protect
      notification: false

    exceptions: []

# Notification settings
notifications:
  enabled: true
  logFile: .agent/knowledge/retention.log
  summary: true # Generate summary report after cleanup

# Safety limits
limits:
  maxDeletePerRun: 10 # Maximum lessons to delete in one run
  maxArchivePerRun: 50 # Maximum lessons to archive in one run
  requireApprovalAbove: 5 # Require approval if > 5 items


# Field operators reference
# =======================
# Operators: equals, notEquals, greaterThan, lessThan, contains, isNull, olderThan, newerThan
# Fields: id, pattern, message, severity, hitCount, lastHit, addedAt, cognitive.confidence, cognitive.maturity, tags
