version: 1
autoLearning: true
autoUpdating: true
updateThreshold: 10
lastUpdateCheck: null
apiKeys:
  gemini: null
  claude: null

# Retention settings (Phase 4)
retention:
  enabled: false # MUST be explicitly enabled
  archiveAfterDays: 90
  deleteAfterDays: 180

# Indexing settings (Phase 2)
indexing:
  enabled: true
  autoRebuild: true

# Metrics settings (Phase 3)
metrics:
  enabled: true
  collectInterval: onScan # onScan, daily, weekly
