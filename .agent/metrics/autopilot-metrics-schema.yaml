# Autopilot Execution Metrics Schema
# Version: 1.0.0
# Purpose: Track autopilot performance for before/after comparison

schema_version: "1.0.0"
last_updated: "2026-01-29"

# === SPEED METRICS ===
speed_metrics:
  time_to_completion:
    id: "TTC"
    description: "End-to-end execution time from plan approval to completion"
    unit: seconds
    target:
      simple_app: 180      # <3 min
      standard_app: 300    # <5 min
      complex_app: 600     # <10 min
    collection: automatic
    severity: P1

  phase_transition_time:
    id: "PTT"
    description: "Time between phase completion and next phase start"
    unit: milliseconds
    target: 2000           # <2s
    collection: automatic
    severity: P0  # Critical for UX

  command_start_latency:
    id: "CSL"
    description: "Time from command invocation to first action"
    unit: milliseconds
    target: 500
    collection: automatic
    severity: P1

# === HUMAN INTERVENTION METRICS ===
intervention_metrics:
  human_interventions:
    id: "HI"
    description: "Count of user interruptions after plan approval"
    unit: count
    target: 0
    collection: automatic
    severity: P0  # Key autonomy metric

  approval_prompts_post_plan:
    id: "APPP"
    description: "Unnecessary approval requests after initial plan approval"
    unit: count
    target: 0
    collection: automatic
    severity: P0

# === AUTONOMY METRICS ===
autonomy_metrics:
  autonomous_completion_rate:
    id: "ACR"
    description: "Tasks completed without human intervention / Total tasks"
    unit: percentage
    target: 95             # >95%
    collection: calculated
    formula: "(tasks_completed_autonomous / total_tasks) * 100"
    severity: P0

  auto_fix_coverage:
    id: "AFC"
    description: "Auto-fixed issues / Total fixable issues"
    unit: percentage
    target: 85             # >85%
    collection: automatic
    severity: P1

# === QUALITY METRICS ===
quality_metrics:
  first_time_success_rate:
    id: "FTSR"
    description: "Successful completions without retry / Total attempts"
    unit: percentage
    target: 95             # >95%
    collection: automatic
    severity: P0

  error_rate:
    id: "ER"
    description: "Errors encountered / Total operations"
    unit: percentage
    target: 5              # <5%
    collection: automatic
    severity: P1

  retry_count:
    id: "RC"
    description: "Number of retries needed per execution"
    unit: count
    target: 2              # <2 per phase
    collection: automatic
    severity: P1

  ide_problems_at_completion:
    id: "IPAC"
    description: "Count of IDE warnings/errors when task marked done"
    unit: count
    target: 0
    collection: automatic
    severity: P0

# === LEARNING METRICS ===
learning_metrics:
  agent_decision_depth:
    id: "ADD"
    description: "Levels of agent delegation (lead → domain → sub)"
    unit: count
    target: null           # Log only, no target
    collection: automatic
    severity: P2

  skill_reuse_ratio:
    id: "SRR"
    description: "Skills reused across tasks / Total skill invocations"
    unit: percentage
    target: 60             # >60%
    collection: calculated
    formula: "(skills_reused / total_skill_invocations) * 100"
    severity: P2

  lessons_logged:
    id: "LL"
    description: "Lessons added to lessons-learned.yaml per execution"
    unit: count
    target: null           # Log on failure only
    collection: automatic
    severity: P2

# === SLO DEFINITIONS ===
slos:
  phase_transition:
    metric: "PTT"
    threshold: 2000
    action: "log_warning"
  
  first_time_success:
    metric: "FTSR"
    threshold: 90
    action: "review_process"
  
  auto_fix_success:
    metric: "AFC"
    threshold: 80
    action: "expand_fix_rules"
  
  rollback_success:
    metric: "rollback_success_rate"
    threshold: 100
    action: "P0_bug"

# === COLLECTION EVENTS ===
collection_events:
  on_autopilot_start:
    - record: timestamp
    - record: task_id
    - save: initial_state
  
  on_phase_complete:
    - record: phase_name
    - record: duration_ms
    - record: status
    - calculate: running_totals
  
  on_error:
    - record: error_type
    - record: was_auto_fixed
    - increment: error_count
  
  on_intervention:
    - record: reason
    - increment: intervention_count
  
  on_autopilot_complete:
    - record: total_duration
    - calculate: all_rates
    - save: final_metrics
    - compare: to_baseline
