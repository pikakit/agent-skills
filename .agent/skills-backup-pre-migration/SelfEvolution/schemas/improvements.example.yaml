  - id: IMPROVE-001
    version: 1
    scope: input-handling
    
    # Core improvement info
    improvement: Centralized input controller with global key bindings
    benefit: Consistent UX across all menus, simpler state management, eliminates ESC key bugs
    context: After fixing multiple ESC handling bugs, centralized all keyboard input
    
    # Pattern to apply
    pattern: |
      // Centralized Input Controller
      const inputController = {
        globalKeys: {
          ESC: () => handleGlobalESC(),
          'CTRL+C': () => handleGlobalExit()
        },
        
        registerMenu: (menu) => {
          menu.on('key', (key) => {
            if (inputController.globalKeys[key]) {
              inputController.globalKeys[key]()
            }
          })
        }
      }
      
      // Usage in menu
      const menu = createMenu()
      inputController.registerMenu(menu)
    
    # When to apply
    when_to_use: |
      - When creating new menu components
      - When handling any keyboard input
      - When fixing navigation issues
    
    # Metrics this improves
    improves_metrics:
