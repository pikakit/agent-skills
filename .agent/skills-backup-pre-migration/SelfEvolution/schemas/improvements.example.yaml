  - id: IMPROVE-002
    version: 1
    scope: input-validation
    improvement: Guard clauses for user input validation
    benefit: Early return on invalid input, cleaner code flow, better error messages
    pattern: |
      // Guard Clause Pattern
      async function handleUserInput(input) {
        // Guard: Check cancellation first
        if (p.isCancel(input)) {
          p.cancel('Operation cancelled')
          return
        }
        
        // Guard: Validate input
        if (!isValid(input)) {
          showError('Invalid input')
          return
        }
        
        // Main logic with valid input
        processInput(input)
      }
    when_to_use: |
      - At start of any function handling user input
      - Before processing async operations
      - When validation has multiple criteria
    category: code-quality
    tags:
      - validation
      - guard-clause
      - error-handling
    created: 2026-01-27T12:12:00Z
    updated: 2026-01-27T12:12:00Z
    previous_versions: []
    appliedCount: 2
    status: active
    related_mistakes:
      - MISTAKE-003

  - id: IMPROVE-003
    version: 1
    scope: menu-navigation
    improvement: While-loop menu pattern instead of recursion
    benefit: Prevents stack overflow, cleaner state management, easier to reason about
    pattern: |
      // While-Loop Menu Pattern
      async function runMenu() {
        showIntro('Menu Title')
        
        while (true) {
          const action = await showActionMenu({...})
          
          // Handle ESC/cancel
          if (p.isCancel(action)) {
            return  // Exit to parent
          }
          
          // Execute action
          switch (action) {
            case 'option1':
              await handleOption1()
              break  // Loop continues, menu redisplays
            case 'exit':
              return  // Exit menu
          }
          // Loop continues automatically
        }
      }
    when_to_use: |
      - All menu navigation
      - Any repeated user interaction
      - Replace recursive menu calls
    category: architecture
    tags:
      - menu
      - loop
      - navigation
      - anti-recursion
    created: 2026-01-27T12:15:00Z
    updated: 2026-01-27T12:15:00Z
    previous_versions: []
    appliedCount: 0
    status: active
    related_mistakes: []

