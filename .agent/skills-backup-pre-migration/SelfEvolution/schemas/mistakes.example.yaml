"""
Mistakes YAML Schema for SelfEvolution v4.0

Stores anti-patterns, errors, bugs, and wrong assumptions.
Purpose: Prevent repeating mistakes in future coding.
"""

# Example mistakes.yaml structure

version: 1
scope: project
event_count: 3
last_improved: null

mistakes:
  - id: MISTAKE-001
    version: 1
    scope: cli-navigation
    
    # Core mistake info
    problem: ESC key handled locally in each menu component
    lesson: Never handle ESC key locally; always use a global input controller with centralized key bindings
    severity: high  # high | medium | low
    impact: Causes navigation deadlock when ESC state becomes corrupted
    
    # Anti-pattern example
    anti_pattern: |
      // BAD: Local ESC handling
      const menu = await customSelect({...})
      if (menu === null) handleESC()
    
    # Correct pattern
    correct_pattern: |
      // GOOD: Use p.select + p.isCancel
      const menu = await p.select({...})
      if (p.isCancel(menu)) return
    
    # Categorization
    category: code-quality
    tags:
      - esc-key
      - menu-navigation
      - input-handling
      - clack
    
    # File scope (optional - which files this applies to)
    applies_to_files:
      - "packages/cli/lib/ui/**/*.js"
      - "!**/*.test.js"
    
    # Lifecycle tracking
    created: 2026-01-27T12:00:00Z
    updated: 2026-01-27T12:00:00Z
    previous_versions: []
    changelog:
      - version: 1
        date: 2026-01-27T12:00:00Z
        change: "Initial: Never use customSelect for menus"
    
    # Metrics
    hitCount: 2  # Times this mistake was violated
    appliedCount: 5  # Times this was successfully prevented
    lastHit: 2026-01-20T10:00:00Z
    lastApplied: 2026-01-27T11:00:00Z
    
    # Status
    status: active  # active | deprecated | superseded
    superseded_by: null  # MISTAKE-XXX if replaced
    deprecated_at: null
    deprecated_reason: null
    
    # Relationships
    related_improvements:
      - IMPROVE-001  # Links to improvements that fix this

  - id: MISTAKE-002
    version: 1
    scope: import-resolution
    problem: Duplicated import resolution logic across multiple files
    lesson: Always centralize import resolution in a single utility module
    severity: medium
    impact: Code duplication and inconsistent behavior
    category: architecture
    tags:
      - import
      - duplication
      - module-resolution
    created: 2026-01-25T10:00:00Z
    updated: 2026-01-25T10:00:00Z
    previous_versions: []
    hitCount: 1
    appliedCount: 0
    status: active
    related_improvements: []

  - id: MISTAKE-003
    version: 2
    scope: async-operations
    problem: Assuming CLI input operations are synchronous
    lesson: Never assume CLI prompts complete synchronously; always await user input
    severity: high
    impact: Race conditions and undefined behavior
    category: code-quality
    tags:
      - async
      - cli-input
      - race-condition
    created: 2026-01-22T15:00:00Z
    updated: 2026-01-27T12:15:00Z
    previous_versions: [1]
    changelog:
      - version: 2
        date: 2026-01-27T12:15:00Z
        change: "Refined: Added race condition impact"
      - version: 1
        date: 2026-01-22T15:00:00Z
        change: "Initial: Don't forget await for prompts"
    hitCount: 0
    appliedCount: 3
    status: active
    related_improvements:
      - IMPROVE-002

# Metadata for entire collection
metadata:
  total_mistakes: 3
  active_mistakes: 3
