# Intent Triggers
# Defines when coinpika-commit-formatter skill should activate

triggers:
  - pattern: "format.*commit"
    confidence: high
  - pattern: "write.*commit.*message"
    confidence: high
  - pattern: "commit.*message"
    confidence: medium
  - pattern: "conventional.*commit"
    confidence: high
  - pattern: "doctrine.*tag"
    confidence: medium

contexts:
  - "git_commit"
  - "pre_commit"
  - "changelog"
  - "version_control"

activation_commands:
  - "git commit"
  - "format-commit"
  - "commit-msg"
