# CoinPika Doctrine Precedence Map
# Defines absolute authority order for conflict resolution.
# Higher precedence ALWAYS overrides lower precedence.
# No implicit override is permitted.

version: 1.0.0
status: LOCKED
authority: SUPREME

precedence:
  - id: coinpika-master-constitution
    level: 0
    authority: supreme
    description: >
      Ultimate constitutional authority.
      Overrides all doctrines, skills, enforcement rules,
      agent behavior, and developer preference.

  - id: coinpika-architecture-doctrine
    level: 1
    authority: constitutional
    description: >
      System-wide architectural boundaries, ownership,
      scalability invariants, and dependency direction.

  - id: coinpika-backend-data-engine-doctrine
    level: 2
    authority: constitutional
    description: >
      Backend truth ownership, ingestion taxonomy,
      persistence, caching, and cost control laws.

  - id: coinpika-chart-data-doctrine
    level: 3
    authority: constitutional
    description: >
      Financial data integrity, historical immutability,
      and chart truth enforcement.

  - id: coinpika-commercial-guardrails-doctrine
    level: 4
    authority: constitutional
    description: >
      Enterprise safety, legal exposure,
      blast radius control, and business continuity rules.

  - id: coinpika-performance-doctrine
    level: 5
    authority: constitutional
    description: >
      User-perceived performance, visual stability,
      cache-first rendering, and trust preservation.

  - id: coinpika-frontend-mobile-doctrine
    level: 6
    authority: constitutional
    description: >
      Mobile-first layout invariants, scroll ownership,
      and structural UX rules.

  - id: coinpika-swipe-tabs-doctrine
    level: 7
    authority: constitutional
    description: >
      Universal swipe-tab architecture,
      gesture arbitration, and navigation consistency.

  - id: coinpika-code-review-doctrine
    level: 8
    authority: enforcement
    description: >
      Review authority, rejection rules,
      and enforcement of architectural law.

  - id: coinpika-learning-engine-doctrine
    level: 9
    authority: controlled-learning
    description: >
      Controlled reasoning improvement,
      learning boundaries, and rollback rules.

  - id: coinpika-agent-enforcement-protocol
    level: 10
    authority: enforcement
    description: >
      AI agent permission model,
      compliance enforcement, and shutdown rules.

  - id: coinpika-frontend-gesture-review-checklist
    level: 11
    authority: enforcement
    description: >
      Hard merge gate for frontend gesture
      and scroll-related changes.

  - id: developer-or-agent-preference
    level: 99
    authority: none
    description: >
      Lowest priority.
      Never allowed to override any doctrine or law.

resolution_rules:
  - rule: higher_precedence_wins
    description: >
      When two documents conflict, the document
      with the LOWER level number wins.

  - rule: ambiguity_equals_rejection
    description: >
      If conflict resolution is ambiguous,
      the change MUST be rejected.

  - rule: no_silent_override
    description: >
      Overrides must be explicit, versioned,
      and approved via a Change Proposal.
