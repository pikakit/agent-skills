name: Lint & Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # CLI Package Linting
      - name: Lint CLI package
        run: |
          echo "🔍 Linting CLI package..."
          npx eslint packages/cli/lib --ext .js
        continue-on-error: true

      # Master Scripts Linting
      - name: Lint master scripts
        run: |
          echo "🔍 Linting master scripts (.agent/scripts-js)..."
          npx eslint .agent/scripts-js --ext .js
        continue-on-error: true

      # Studio Scripts Linting
      - name: Lint Studio scripts
        run: |
          echo "🔍 Linting Studio scripts (.agent/studio/scripts-js)..."
          npx eslint .agent/studio/scripts-js --ext .js
        continue-on-error: true

      # Formatting Check
      - name: Check code formatting
        run: |
          echo "✨ Checking code formatting..."
          npx prettier --check "packages/cli/lib/**/*.js" ".agent/**/*.js" --ignore-path .gitignore
        continue-on-error: true

      # TypeScript Check (for .d.ts files)
      - name: TypeScript validation
        run: |
          echo "📝 Validating TypeScript definitions..."
          npx tsc --noEmit --project .agent/.shared/studio/scripts-js/jsconfig.json
        continue-on-error: true

      - name: Lint summary
        run: |
          echo "✅ Code quality checks completed!"
          echo "- CLI package linted"
          echo "- Master scripts linted"
          echo "- Studio scripts linted"
          echo "- Formatting checked"
          echo "- TypeScript validated"
