name: Lint

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: |
          echo "Running ESLint..."
          npx eslint packages/cli/src packages/cli/lib --ext .js
        continue-on-error: true
      
      - name: Check formatting
        run: |
          echo "Checking code formatting..."
          npx prettier --check packages/cli/src packages/cli/lib
        continue-on-error: true
      
      - name: Lint summary
        run: echo "✅ Lint check completed!"
