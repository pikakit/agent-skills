name: Release and Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  # Create GitHub Release
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          body: |
            ## 🚀 PikaKit Release ${{ steps.version.outputs.VERSION }}

            See [CHANGELOG.md](https://github.com/pikakit/agent-skills/blob/main/CHANGELOG.md) for details.

            ### Quick Install
            ```bash
            npx pikakit
            ```

  # Publish to NPM (CLI package)
  publish-cli:
    name: Publish CLI to NPM
    runs-on: ubuntu-latest
    needs: release
    if: ${{ !contains(github.ref, 'alpha') && !contains(github.ref, 'beta') }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci
        working-directory: packages/cli

      - name: Run tests before publish
        run: npm test
        working-directory: packages/cli

      - name: Publish to NPM
        run: npm publish --provenance --access public
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Summary
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [release, publish-cli]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "✅ Release workflow completed!"
          echo "- GitHub Release created"
          echo "- NPM package published (if stable)"
