name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Root-level tests (Studio + Integration)
  root-tests:
    name: Root Tests (Studio + Scripts)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Studio tests
        run: npm run test:studio

      - name: Run integration tests
        run: npm run test:integration
        continue-on-error: true

  # CLI package tests
  cli-tests:
    name: CLI Package Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: packages/agent/package-lock.json

      - name: Install CLI dependencies
        run: npm ci
        working-directory: packages/agent

      - name: Run CLI tests
        run: npm test
        working-directory: packages/agent

  # Summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [root-tests, cli-tests]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "✅ All test suites completed!"
          echo "- Root tests (Studio + Integration)"
          echo "- CLI package tests"
